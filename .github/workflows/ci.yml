name: ci

on:
  push:
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        run: |
          curl -fsSL "https://github.com/pnpm/pnpm/releases/download/v9.12.0/pnpm-linux-x64" -o /usr/local/bin/pnpm
          chmod +x /usr/local/bin/pnpm
          pnpm --version

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: pnpm install

      - name: Lint
        run: pnpm lint

      - name: Build
        run: pnpm build

      - name: Typecheck
        run: pnpm typecheck

      - name: Unit tests with coverage
        run: pnpm test:coverage

      - name: Version consistency check
        run: pnpm version:check

  integration:
    runs-on: ubuntu-latest
    needs: quality
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        run: |
          curl -fsSL "https://github.com/pnpm/pnpm/releases/download/v9.12.0/pnpm-linux-x64" -o /usr/local/bin/pnpm
          chmod +x /usr/local/bin/pnpm
          pnpm --version

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: pnpm install

      - name: Prepare env
        run: |
          cp .env.example .env
          sed -i 's/^KRYFTO_API_TOKEN=.*/KRYFTO_API_TOKEN=dev_admin_token_change_me/' .env
          sed -i 's/^KRYFTO_BOOTSTRAP_ADMIN_TOKEN=.*/KRYFTO_BOOTSTRAP_ADMIN_TOKEN=dev_admin_token_change_me/' .env

      - name: Build and start compose
        run: docker compose up -d --build

      - name: Wait for API
        run: |
          for i in {1..60}; do
            if curl -sf http://localhost:8080/v1/healthz >/dev/null; then
              exit 0
            fi
            sleep 5
          done
          echo "API did not become healthy in time"
          docker compose logs api worker
          exit 1

      - name: Verify worker is running
        run: |
          echo "=== Container status ==="
          docker compose ps
          echo ""
          echo "=== Worker logs (last 30 lines) ==="
          docker compose logs worker --tail 30
          echo ""
          # Check if worker container is actually running
          if ! docker compose ps worker | grep -q "running\|Up"; then
            echo "❌ Worker container is not running!"
            docker compose logs worker
            exit 1
          fi
          # Wait for 'Worker online' log message (max 30s)
          for i in {1..15}; do
            if docker compose logs worker 2>&1 | grep -q "Worker online"; then
              echo "✅ Worker is online and processing jobs"
              exit 0
            fi
            sleep 2
          done
          echo "⚠️ Worker is running but 'Worker online' not found in logs — proceeding anyway"

      - name: Integration tests
        env:
          COLLECTOR_BASE_URL: http://localhost:8080
          COLLECTOR_API_TOKEN: dev_admin_token_change_me
        run: pnpm test:integration

      - name: E2E tests
        env:
          COLLECTOR_BASE_URL: http://localhost:8080
          COLLECTOR_API_TOKEN: dev_admin_token_change_me
        run: pnpm test:e2e

      - name: CI Evals (Search Quality)
        env:
          COLLECTOR_BASE_URL: http://localhost:8080
          KRYFTO_API_TOKEN: dev_admin_token_change_me
        run: pnpm test:eval 2>&1 | tee eval-results.json

      - name: Upload eval results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: eval-results
          path: eval-results.json
          retention-days: 30

      - name: Docker image scan (Trivy)
        uses: aquasecurity/trivy-action@0.31.0
        with:
          scan-type: fs
          scan-ref: .
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          format: table

      - name: Compose logs on failure
        if: failure()
        run: docker compose logs

      - name: Shutdown compose
        if: always()
        run: docker compose down -v
