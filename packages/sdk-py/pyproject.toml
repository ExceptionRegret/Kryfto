[project]
name = "collector-sdk"
version = "0.1.0"
description = "Python SDK for Web Collector Runtime"
requires-python = ">=3.10"
dependencies = ["requests>=2.31.0"]

[build-system]
requires = ["setuptools>=69.0.0"]
build-backend = "setuptools.build_meta"

[tool.setuptools]
packages = ["collector_sdk"]
